name: ci
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # the engine's golden test reads the contract from the secha-metadata repo
      - uses: actions/checkout@v4
        with:
          repository: secha-project/secha-metadata
          path: secha-metadata-checkout
      - uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.11"
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy src
      - run: SECHA_METADATA_ROOT=$GITHUB_WORKSPACE/secha-metadata-checkout uv run pytest
