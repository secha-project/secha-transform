<svg width="100%" viewBox="0 0 680 462" role="img" xmlns="http://www.w3.org/2000/svg">
<title>secha-transform data flow</title>
<desc>Raw JSON from secha-ingestion and the rulebook from secha-metadata feed the deterministic, vendor-blind transform engine, which reads raw + device factors, unpivots and transforms (scale uk/ik, attach UTC), assigns a stable measurement_id, and writes canonical rows: parquet locally in Phase 1, Delta/Unity Catalog with wide serving views in Phase 3.</desc>
<style>
  text { font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  .t  { font-size: 14px; font-weight: 600; fill: #1b1b19; }
  .ts { font-size: 12px; font-weight: 400; fill: #5b5b56; }
  rect.box     { fill: #f7f6f1; stroke: #c9c7bd; }
  .c-blue rect { fill: #e6f1fb; stroke: #378add; }
  .c-gray rect { fill: #f1efe8; stroke: #888780; }
  rect.c-blue  { fill: #e6f1fb; stroke: #378add; }
  rect.c-gray  { fill: #f1efe8; stroke: #888780; }
  .arr { stroke: #6b6b66; stroke-width: 1.5; fill: none; }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M1,1 L9,5 L1,9" fill="none" stroke="#6b6b66" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<g class="c-gray"><rect x="40" y="44" width="270" height="52" rx="6" stroke-width="0.5"/></g>
<text class="t"  x="54" y="66">Raw JSON</text>
<text class="ts" x="54" y="84">from secha-ingestion (Bronze)</text>

<g class="c-gray"><rect x="370" y="44" width="270" height="52" rx="6" stroke-width="0.5"/></g>
<text class="t"  x="384" y="66">Rulebook</text>
<text class="ts" x="384" y="84">secha-metadata configs</text>

<line class="arr" x1="175" y1="96" x2="175" y2="150" marker-end="url(#arrow)"/>
<text class="ts" x="185" y="126" text-anchor="start">raw + factors</text>
<line class="arr" x1="505" y1="96" x2="505" y2="150" marker-end="url(#arrow)"/>
<text class="ts" x="515" y="126" text-anchor="start">config</text>

<rect class="box" x="40" y="150" width="600" height="150" rx="8" stroke-width="0.5"/>
<text class="t" x="52" y="173">secha-transform engine (deterministic · vendor-blind)</text>

<g class="c-blue"><rect x="56" y="190" width="182" height="64" rx="6" stroke-width="0.5"/></g>
<text class="t"  x="147" y="216" text-anchor="middle">read raw + factors</text>
<text class="ts" x="147" y="233" text-anchor="middle">from the landing zone</text>

<g class="c-blue"><rect x="249" y="190" width="182" height="64" rx="6" stroke-width="0.5"/></g>
<text class="t"  x="340" y="216" text-anchor="middle">unpivot + transform</text>
<text class="ts" x="340" y="233" text-anchor="middle">scale uk/ik · attach UTC</text>

<g class="c-blue"><rect x="442" y="190" width="182" height="64" rx="6" stroke-width="0.5"/></g>
<text class="t"  x="533" y="216" text-anchor="middle">assign id + validate</text>
<text class="ts" x="533" y="233" text-anchor="middle">stable measurement_id</text>

<line class="arr" x1="238" y1="222" x2="249" y2="222" marker-end="url(#arrow)"/>
<line class="arr" x1="431" y1="222" x2="442" y2="222" marker-end="url(#arrow)"/>

<line class="arr" x1="175" y1="300" x2="175" y2="352" marker-end="url(#arrow)"/>
<text class="ts" x="185" y="330" text-anchor="start">writes</text>
<line class="arr" x1="505" y1="300" x2="505" y2="352" marker-end="url(#arrow)" style="stroke-dasharray:5 3"/>
<text class="ts" x="515" y="330" text-anchor="start">Phase 3</text>

<g class="c-blue"><rect x="40" y="352" width="270" height="56" rx="6" stroke-width="0.5"/></g>
<text class="t"  x="54" y="376">Canonical parquet</text>
<text class="ts" x="54" y="394">Phase 1 · local (now)</text>

<g class="c-gray"><rect x="370" y="352" width="270" height="56" rx="6" stroke-width="1" style="stroke-dasharray:5 3"/></g>
<text class="t"  x="384" y="376">Delta / Unity Catalog</text>
<text class="ts" x="384" y="394">+ wide serving views (later)</text>

<rect class="c-blue" x="40" y="430" width="13" height="13" rx="3" stroke-width="0.5"/>
<text class="ts" x="58" y="440">secha-transform (this repo)</text>
<rect class="c-gray" x="320" y="430" width="13" height="13" rx="3" stroke-width="0.5"/>
<text class="ts" x="338" y="440">inputs / future targets</text>
</svg>
